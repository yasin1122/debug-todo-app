<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Debug Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>

<!-- login-page is a CSS class that vertically centres the card on the screen. -->
<body class="light-theme login-page">
    <div class="login-container">
        <div class="login-card">
            <h1>Todo Debug App</h1>
            <p class="login-subtitle">Login to manage your todos</p>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <!-- autofocus puts the cursor here automatically so the
                         user can start typing straight away. -->
                    <input type="text" id="username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <!-- type="password" hides the characters as the user types. -->
                    <input type="password" id="password" required>
                </div>

                <!-- btn-block makes the button span the full width of the card. -->
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <!-- Hidden by default; shown with an error message if login fails. -->
            <div id="error-message" class="error-message" style="display: none;"></div>

            <!-- Quick reference so users don't have to look up demo credentials. -->
            <div class="demo-users">
                <h3>Demo Users:</h3>
                <ul>
                    <li>demo / demo123</li>
                    <li>alice / alice123</li>
                    <li>bob / bob123</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // The login page is simple enough that its JavaScript lives inline
        // here rather than in a separate file.

        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', async (e) => {
            // Prevent the default form submission, which would reload the page.
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                // POST the credentials to the proxy, which forwards them to
                // the Users API. The proxy returns a session token on success.
                const response = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Save the token and user info in localStorage so they
                    // survive page refreshes and can be read by app.js.
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('username', data.username);

                    // Redirect to the main app page.
                    window.location.href = 'index.html';
                } else {
                    // Show the server's error message (e.g. "Invalid credentials").
                    errorMessage.textContent = data.error || 'Login failed';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                // fetch() itself throws if the network request fails completely
                // (e.g. the backend isn't running).
                errorMessage.textContent = 'Connection error. Make sure the backend is running.';
                errorMessage.style.display = 'block';
                console.error('Login error:', error);
            }
        });
    </script>
</body>
</html>
